<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#7b2ff7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00d2ff" flood-opacity="0.3"/>
    </filter>
    <filter id="textshadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- Glow orbs -->
  <circle cx="150" cy="150" r="120" fill="url(#glow)" opacity="0.5"/>
  <circle cx="1050" cy="150" r="100" fill="url(#glow)" opacity="0.3"/>

  <!-- Left icon: Neam logo stylized -->
  <g transform="translate(80, 85)" filter="url(#shadow)">
    <!-- Hexagon shape -->
    <polygon points="65,0 120,32 120,98 65,130 10,98 10,32" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <!-- N letter -->
    <text x="65" y="85" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="60" font-weight="700" fill="url(#accent)" text-anchor="middle">N</text>
  </g>

  <!-- Main title -->
  <text x="250" y="120" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="800" fill="#ffffff" filter="url(#textshadow)">NeamSkills</text>

  <!-- Subtitle -->
  <text x="253" y="165" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#a0aec0" font-weight="400">Official Skill Library for the AI-Native Programming Language</text>

  <!-- Feature pills -->
  <g transform="translate(253, 190)">
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#00d2ff" opacity="0.15" stroke="#00d2ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="55" y="19" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#00d2ff" text-anchor="middle" font-weight="600">13 Types</text>

    <rect x="120" y="0" width="130" height="28" rx="14" fill="#7b2ff7" opacity="0.15" stroke="#7b2ff7" stroke-width="1" stroke-opacity="0.4"/>
    <text x="185" y="19" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="600">7 Providers</text>

    <rect x="260" y="0" width="140" height="28" rx="14" fill="#00d2ff" opacity="0.15" stroke="#00d2ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="330" y="19" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#00d2ff" text-anchor="middle" font-weight="600">8 RAG Strategies</text>

    <rect x="410" y="0" width="120" height="28" rx="14" fill="#7b2ff7" opacity="0.15" stroke="#7b2ff7" stroke-width="1" stroke-opacity="0.4"/>
    <text x="470" y="19" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="600">31+ Skills</text>

    <rect x="540" y="0" width="150" height="28" rx="14" fill="#00d2ff" opacity="0.15" stroke="#00d2ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="615" y="19" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" fill="#00d2ff" text-anchor="middle" font-weight="600">100+ Built-ins</text>
  </g>

  <!-- Right side: code snippet decoration -->
  <g transform="translate(830, 75)" opacity="0.6">
    <rect x="0" y="0" width="320" height="160" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
    <!-- Window dots -->
    <circle cx="16" cy="14" r="4" fill="#ff5f57"/>
    <circle cx="30" cy="14" r="4" fill="#febc2e"/>
    <circle cx="44" cy="14" r="4" fill="#28c840"/>
    <!-- Code lines -->
    <text x="16" y="45" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#7b2ff7" font-weight="600">agent</text>
    <text x="60" y="45" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#00d2ff">Assistant</text>
    <text x="130" y="45" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#888">{</text>
    <text x="28" y="63" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#a0aec0">provider:</text>
    <text x="100" y="63" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#a5d6a7">"openai"</text>
    <text x="28" y="81" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#a0aec0">model:</text>
    <text x="80" y="81" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#a5d6a7">"gpt-4o-mini"</text>
    <text x="28" y="99" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#a0aec0">skills:</text>
    <text x="80" y="99" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#888">[</text>
    <text x="86" y="99" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#00d2ff">Calculator</text>
    <text x="160" y="99" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#888">]</text>
    <text x="16" y="117" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#888">}</text>
    <text x="16" y="145" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#7b2ff7" font-weight="600">emit</text>
    <text x="48" y="145" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#a0aec0">Assistant.</text>
    <text x="118" y="145" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#ffcc02">ask</text>
    <text x="138" y="145" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#888">(</text>
    <text x="144" y="145" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#a5d6a7">"..."</text>
    <text x="168" y="145" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#888">);</text>
  </g>

  <!-- Accent line bottom -->
  <rect x="0" y="297" width="1200" height="3" fill="url(#accent)" rx="1.5"/>
</svg>
